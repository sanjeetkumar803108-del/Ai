name: Form Mitra APK Auto Builder

on:
  push:
    branches:
      - main  # Agar tumhari branch ka naam 'master' hai, toh yahan master likh dena

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code ko Checkout karo
        uses: actions/checkout@v3

      - name: Java Setup (Android ke liye zaroori hai)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Flutter Setup karo
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Packages install karo
        run: flutter pub get

      - name: Real Release APK banao
        run: flutter build apk --release --no-tree-shake-icons

      - name: APK ko Download ke liye ready karo
        uses: actions/upload-artifact@v3
        with:
          name: Form-Mitra-AI-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          
