name: Form Mitra Expo APK Auto Builder

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Code ko Checkout karo
        uses: actions/checkout@v4

      - name: Node.js Setup karo
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Java Setup karo (Strict Java 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Dependencies install aur AI Code Fix karo
        run: |
          cd native
          npm install
          npx expo install --fix

      - name: Bulletproof Base64 Logo Hack
        run: |
          cd native
          mkdir -p assets
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAACklEQVR4nGMAAQAABQABDQottAAAAABJRU5ErkJggg==" | base64 --decode > assets/icon.png
          cp assets/icon.png assets/adaptive-icon.png
          cp assets/icon.png assets/splash.png
          cp assets/icon.png assets/favicon.png

      - name: Real Local Release APK banao (Forced Java 17)
        run: |
          cd native
          npx expo prebuild --platform android --clean
          cd android && ./gradlew assembleRelease -Dorg.gradle.java.home=$JAVA_HOME

      - name: APK ko Download ke liye ready karo
        uses: actions/upload-artifact@v4
        with:
          name: Form-Mitra-AI-Native-APK
          path: native/android/app/build/outputs/apk/release/app-release.apk
          
