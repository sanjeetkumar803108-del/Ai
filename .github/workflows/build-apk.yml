name: Form Mitra Expo APK Auto Builder

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code ko Checkout karo
        uses: actions/checkout@v4

      - name: Node.js Setup karo
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Java Setup karo (Android ke liye zaroori hai)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Dependencies install karo
        run: |
          cd native
          npm install

      - name: Dummy Logo ki Ninja Jugad
        run: |
          cd native
          # Ek dummy app banakar uski asli photos chura lenge
          npx create-expo-app dummy-app -t blank --yes
          mkdir -p assets
          cp -r dummy-app/assets/* assets/
          rm -rf dummy-app

      - name: Real Local Release APK banao
        run: |
          cd native
          npx expo prebuild --platform android
          cd android && ./gradlew assembleRelease

      - name: APK ko Download ke liye ready karo
        uses: actions/upload-artifact@v4
        with:
          name: Form-Mitra-AI-Native-APK
          path: native/android/app/build/outputs/apk/release/app-release.apk
          
