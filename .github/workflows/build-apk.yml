name: Form Mitra Expo APK Auto Builder

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code ko Checkout karo
        uses: actions/checkout@v4

      - name: Node.js Setup karo
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Java Setup karo (Android ke liye zaroori hai)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Dependencies install karo
        run: |
          cd native
          npm install

      - name: Bulletproof Base64 Logo Hack (No Internet needed)
        run: |
          cd native
          mkdir -p assets
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAACklEQVR4nGMAAQAABQABDQottAAAAABJRU5ErkJggg==" | base64 --decode > assets/icon.png
          cp assets/icon.png assets/adaptive-icon.png
          cp assets/icon.png assets/splash.png
          cp assets/icon.png assets/favicon.png

      - name: Real Local Release APK banao
        run: |
          cd native
          npx expo prebuild --platform android
          cd android && ./gradlew assembleRelease

      - name: APK ko Download ke liye ready karo
        uses: actions/upload-artifact@v4
        with:
          name: Form-Mitra-AI-Native-APK
          path: native/android/app/build/outputs/apk/release/app-release.apk
          
