name: Form Mitra Expo APK Auto Builder

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code ko Checkout karo
        uses: actions/checkout@v4

      - name: Node.js Setup karo
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Java Setup karo (Android ke liye zaroori hai)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Dependencies install karo
        run: |
          cd native
          npm install

      - name: Dummy Logo aur Splash Screen ki Jugad
        run: |
          cd native
          mkdir -p assets
          wget -O assets/icon.png https://raw.githubusercontent.com/expo/expo/main/templates/expo-template-blank/assets/icon.png || true
          wget -O assets/adaptive-icon.png https://raw.githubusercontent.com/expo/expo/main/templates/expo-template-blank/assets/adaptive-icon.png || true
          wget -O assets/splash.png https://raw.githubusercontent.com/expo/expo/main/templates/expo-template-blank/assets/splash.png || true
          wget -O assets/favicon.png https://raw.githubusercontent.com/expo/expo/main/templates/expo-template-blank/assets/favicon.png || true

      - name: Real Local Release APK banao
        run: |
          cd native
          npx expo prebuild --platform android
          cd android && ./gradlew assembleRelease

      - name: APK ko Download ke liye ready karo
        uses: actions/upload-artifact@v4
        with:
          name: Form-Mitra-AI-Native-APK
          path: native/android/app/build/outputs/apk/release/app-release.apk
          
